# =============================================================================
# Pipeline de ejemplo: ejecucion diaria
#
# Ejecutar con:
#   python -m src.main --pipeline config/pipelines/diario.yaml
#
# Campos a nivel de pipeline:
#   name        (opcional): nombre descriptivo del pipeline
#   description (opcional): descripcion del pipeline
#   parallel    (opcional): true para ejecutar todos los jobs a la vez (default: false)
#               Util cuando los jobs son independientes entre si.
#               Con consolidacion: los jobs corren en paralelo y el merge al final en serie.
#
# Campos por job:
#   name     (obligatorio): nombre del job (carpeta en src/)
#   params   (opcional):    parametros como dict nativo YAML con tipos reales
#   enabled  (opcional):    false para omitir el job sin borrarlo (default: true)
#   schedule (opcional):    programacion del job; omitir = ejecutar siempre
#     day_of_month: 3       ejecutar solo el dia 3 de cada mes (1-31)
#     day_of_week:  0       ejecutar solo los lunes (0=lunes ... 6=domingo)
#                           Se pueden combinar (AND logico)
#
# Con schedule activo, si un job es omitido por no ser su dia, la consolidacion
# tambien se omite (faltan datos de ese job).
#
# Bloque consolidate (opcional):
#   enabled (obligatorio): true para activar la consolidacion
#   module  (obligatorio): nombre del modulo en src/consolidadores/ (sin .py)
#   format  (obligatorio): formato compartido por todos los jobs (csv/json/xml/xlsx)
#                          todos los jobs deben incluirlo en su output_formats
#   params  (opcional):    parametros adicionales para el consolidador
#
# Nota: la consolidacion solo se ejecuta si TODOS los jobs del pipeline
# finalizan exitosamente.
# =============================================================================

# =========================================================================
# ZONA DATA ENGINEER — definir jobs, params y bloque consolidate
# =========================================================================

name: diario
description: "Scraping diario de catalogo de libros y viviendas"
# parallel: true   # Descomentar para ejecutar ambos jobs a la vez

jobs:
  - name: books_to_scrape
    params:
      categoria: mystery
      pagina: 1

  - name: viviendas_adonde
    params:
      pais: peru
      max_paginas: 5
      solo_nuevos: true

